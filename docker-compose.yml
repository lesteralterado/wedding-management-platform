services:
  postgres:
    image: postgres:16-alpine
    container_name: wedding-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wedding_platform
    ports:
      - "5432:5432"
    volumes:
      - wedding-platform-postgres:/var/lib/postgresql/data

volumes:
  wedding-platform-postgres:
